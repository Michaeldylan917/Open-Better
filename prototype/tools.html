<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodDiary - 急救包</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #F7F7F5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col text-gray-800">

    <!-- Status Bar Placeholder -->
    <div class="h-12 w-full shrink-0"></div>

    <!-- Header -->
    <div class="px-6 pb-2 flex justify-between items-center shrink-0">
        <h1 class="text-2xl font-bold text-gray-900">情绪急救</h1>
    </div>

    <!-- Content -->
    <div class="flex-1 overflow-y-auto hide-scrollbar px-6 pb-24 space-y-6 pt-4">

        <!-- Breathing Exercise Card (Featured) -->
        <div class="glass-card rounded-2xl p-6 bg-gradient-to-br from-blue-50 to-white relative overflow-hidden group cursor-pointer">
            <div class="relative z-10">
                <div class="w-12 h-12 rounded-full bg-blue-100 text-blue-500 flex items-center justify-center text-2xl mb-4">
                    <i class="fas fa-wind"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-900">4-7-8 呼吸法</h2>
                <p class="text-gray-500 text-sm mt-2">缓解焦虑，助眠放松。吸气4秒，憋气7秒，呼气8秒。</p>
                <button class="mt-4 px-4 py-2 bg-blue-500 text-white rounded-full text-sm font-semibold shadow-md hover:bg-blue-600 transition">
                    开始练习
                </button>
            </div>
            <div class="absolute -right-8 -bottom-8 text-9xl text-blue-50 opacity-50">
                <i class="fas fa-cloud"></i>
            </div>
        </div>

        <!-- Other Tools Grid -->
        <div class="grid grid-cols-2 gap-4">
            
            <!-- 2048 Game -->
            <div class="glass-card rounded-2xl p-4 flex flex-col items-center text-center hover:bg-white transition cursor-pointer">
                <div class="w-12 h-12 rounded-full bg-pink-100 text-pink-500 flex items-center justify-center text-2xl mb-3">
                    <i class="fas fa-puzzle-piece"></i>
                </div>
                <h3 class="font-bold text-gray-800 text-sm">2048</h3>
                <p class="text-xs text-gray-400 mt-1">数字益智</p>
            </div>

            <!-- Daily Wisdom -->
            <div class="glass-card rounded-2xl p-4 flex flex-col items-center text-center hover:bg-white transition cursor-pointer">
                <div class="w-12 h-12 rounded-full bg-purple-100 text-purple-500 flex items-center justify-center text-2xl mb-3">
                    <i class="fas fa-quote-right"></i>
                </div>
                <h3 class="font-bold text-gray-800 text-sm">治愈金句</h3>
                <p class="text-xs text-gray-400 mt-1">每日心灵慰藉</p>
            </div>

            <!-- White Noise -->
            <div class="glass-card rounded-2xl p-4 flex flex-col items-center text-center hover:bg-white transition cursor-pointer">
                <div class="w-12 h-12 rounded-full bg-green-100 text-green-500 flex items-center justify-center text-2xl mb-3">
                    <i class="fas fa-music"></i>
                </div>
                <h3 class="font-bold text-gray-800 text-sm">白噪音</h3>
                <p class="text-xs text-gray-400 mt-1">雨声, 森林...</p>
            </div>

            <!-- Emergency Contact -->
            <div class="glass-card rounded-2xl p-4 flex flex-col items-center text-center hover:bg-white transition cursor-pointer">
                <div class="w-12 h-12 rounded-full bg-red-100 text-red-500 flex items-center justify-center text-2xl mb-3">
                    <i class="fas fa-phone-alt"></i>
                </div>
                <h3 class="font-bold text-gray-800 text-sm">紧急求助</h3>
                <p class="text-xs text-gray-400 mt-1">专业热线</p>
            </div>
        </div>

        <!-- Quote of the Day Preview -->
        <div class="glass-card rounded-2xl p-6 text-center relative overflow-hidden">
            <i class="fas fa-quote-left text-4xl text-gray-100 absolute top-2 left-4"></i>
            <p class="text-gray-700 font-serif italic text-lg relative z-10">"万物皆有裂痕，那是光照进来的地方。"</p>
            <p class="text-gray-400 text-xs mt-3 relative z-10">— 莱昂纳德·科恩</p>
        </div>

    </div>

    <!-- Bottom Navigation Bar -->
    <div class="h-20 bg-white/80 backdrop-blur-xl border-t border-gray-200 flex justify-between items-end px-6 pb-4 shrink-0 absolute bottom-0 w-full z-50">
        <a href="home.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 transition w-12">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-medium">首页</span>
        </a>
        <a href="stats.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 transition w-12">
            <i class="fas fa-chart-pie text-xl"></i>
            <span class="text-[10px] font-medium">统计</span>
        </a>

        <div class="relative -top-5">
             <a href="editor.html" class="w-14 h-14 bg-gray-900 rounded-full flex items-center justify-center text-white shadow-lg text-2xl hover:scale-105 transition-transform border-4 border-[#F7F7F5]">
                <i class="fas fa-plus"></i>
            </a>
        </div>

        <a href="#" class="flex flex-col items-center gap-1 text-gray-900 w-12">
            <i class="fas fa-first-aid text-xl"></i>
            <span class="text-[10px] font-medium">急救</span>
        </a>
        <a href="settings.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 transition w-12">
            <i class="fas fa-cog text-xl"></i>
            <span class="text-[10px] font-medium">设置</span>
        </a>
    </div>

</body>
</html>
