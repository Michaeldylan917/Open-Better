<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodDiary - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Quicksand', 'sans-serif'],
                    },
                    colors: {
                        bg: '#FAFAF9',
                        card: '#FFFFFF',
                        primary: '#333333',
                        secondary: '#8E8E93',
                        'mood-ecstatic': '#FFD166', // Gold/Yellow
                        'mood-happy': '#FFB7B2',    // Peach
                        'mood-neutral': '#E2F0CB',  // Sage
                        'mood-sad': '#B5EAD7',      // Fog Blue
                        'mood-angry': '#FF9AA2',    // Coral
                    }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-bg text-primary font-sans h-screen overflow-hidden flex flex-col select-none">

    <!-- Status Bar (iOS Mock) -->
    <div class="h-12 flex justify-between items-center px-6 text-sm font-medium pt-2 z-50 bg-bg">
        <span>9:41</span>
        <div class="flex items-center space-x-2">
            <i class="fas fa-signal text-xs"></i>
            <i class="fas fa-wifi text-xs"></i>
            <i class="fas fa-battery-full text-xs"></i>
        </div>
    </div>

    <!-- Header -->
    <header class="px-6 pt-2 pb-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <h1 class="text-2xl font-bold text-primary">2025年 12月</h1>
            <i class="fas fa-chevron-down text-sm text-secondary"></i>
        </div>
        <button class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-secondary hover:bg-gray-50">
            <i class="fas fa-search"></i>
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto hide-scrollbar px-6 pb-24">
        
        <!-- Calendar Card -->
        <div class="bg-white rounded-3xl shadow-sm p-5 mb-6">
            <!-- Week Days -->
            <div class="grid grid-cols-7 mb-4 text-center">
                <div class="text-xs text-secondary font-bold">日</div>
                <div class="text-xs text-secondary font-bold">一</div>
                <div class="text-xs text-secondary font-bold">二</div>
                <div class="text-xs text-secondary font-bold">三</div>
                <div class="text-xs text-secondary font-bold">四</div>
                <div class="text-xs text-secondary font-bold">五</div>
                <div class="text-xs text-secondary font-bold">六</div>
            </div>
            
            <!-- Days Grid -->
            <div class="grid grid-cols-7 gap-y-4 text-center">
                <!-- Previous Month -->
                <div class="text-gray-300 text-sm py-2">30</div>
                
                <!-- Current Month -->
                <div class="text-sm py-2 flex flex-col items-center gap-1">
                    <span>1</span>
                    <div class="w-2 h-2 rounded-full bg-mood-happy"></div>
                </div>
                <div class="text-sm py-2 flex flex-col items-center gap-1">
                    <span>2</span>
                    <div class="w-2 h-2 rounded-full bg-mood-neutral"></div>
                </div>
                <div class="text-sm py-2 flex flex-col items-center gap-1">
                    <span>3</span>
                    <div class="w-2 h-2 rounded-full bg-mood-happy"></div>
                </div>
                <div class="text-sm py-2 flex flex-col items-center gap-1">
                    <span>4</span>
                    <div class="w-2 h-2 rounded-full bg-mood-sad"></div>
                </div>
                <div class="text-sm py-2 flex flex-col items-center gap-1">
                    <span>5</span>
                    <div class="w-2 h-2 rounded-full bg-mood-ecstatic"></div>
                </div>
                
                <!-- Today -->
                <div class="relative text-sm py-2 flex flex-col items-center gap-1">
                    <span class="w-7 h-7 bg-primary text-white rounded-full flex items-center justify-center -mt-1 shadow-md">6</span>
                    <div class="w-2 h-2 rounded-full bg-gray-200"></div>
                </div>
                
                <!-- Future Days -->
                <div class="text-sm py-2 text-primary">7</div>
                <div class="text-sm py-2 text-primary">8</div>
                <div class="text-sm py-2 text-primary">9</div>
                <div class="text-sm py-2 text-primary">10</div>
                <div class="text-sm py-2 text-primary">11</div>
                <div class="text-sm py-2 text-primary">12</div>
                <div class="text-sm py-2 text-primary">13</div>
                <div class="text-sm py-2 text-primary">14</div>
                <div class="text-sm py-2 text-primary">15</div>
                <div class="text-sm py-2 text-primary">16</div>
                <div class="text-sm py-2 text-primary">17</div>
                <div class="text-sm py-2 text-primary">18</div>
                <div class="text-sm py-2 text-primary">19</div>
                <div class="text-sm py-2 text-primary">20</div>
                <div class="text-sm py-2 text-primary">21</div>
                <div class="text-sm py-2 text-primary">22</div>
                <div class="text-sm py-2 text-primary">23</div>
                <div class="text-sm py-2 text-primary">24</div>
                <div class="text-sm py-2 text-primary">25</div>
                <div class="text-sm py-2 text-primary">26</div>
                <div class="text-sm py-2 text-primary">27</div>
                <div class="text-sm py-2 text-primary">28</div>
                <div class="text-sm py-2 text-primary">29</div>
                <div class="text-sm py-2 text-primary">30</div>
                <div class="text-sm py-2 text-primary">31</div>
            </div>
        </div>

        <!-- Today's Log Prompt -->
        <div class="bg-mood-happy/20 rounded-3xl p-6 flex items-center justify-between mb-6">
            <div>
                <h3 class="text-lg font-bold text-primary mb-1">今天过得怎么样?</h3>
                <p class="text-xs text-secondary">记录下当下的心情吧</p>
            </div>
            <a href="editor.html" class="w-12 h-12 bg-mood-happy rounded-full flex items-center justify-center text-white shadow-md hover:scale-105 transition-transform">
                <i class="fas fa-plus"></i>
            </a>
        </div>

        <!-- Recent Memories -->
        <h2 class="text-lg font-bold text-primary mb-4 px-1">最近的回忆</h2>
        
        <div class="space-y-3">
            <!-- Memory Card 1 -->
            <div class="bg-white rounded-2xl p-4 shadow-sm flex gap-4 items-start">
                <div class="w-10 h-10 rounded-full bg-mood-ecstatic/20 flex items-center justify-center text-xl">
                    🤩
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-bold text-primary">非常开心!</span>
                        <span class="text-xs text-secondary">昨天</span>
                    </div>
                    <p class="text-sm text-secondary leading-relaxed">终于完成了项目的里程碑，和朋友去吃了火锅，超级满足！🍲✨</p>
                </div>
            </div>

            <!-- Memory Card 2 -->
            <div class="bg-white rounded-2xl p-4 shadow-sm flex gap-4 items-start">
                <div class="w-10 h-10 rounded-full bg-mood-sad/20 flex items-center justify-center text-xl">
                    😔
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-bold text-primary">有点难过</span>
                        <span class="text-xs text-secondary">12月4日</span>
                    </div>
                    <p class="text-sm text-secondary leading-relaxed">外面下了一整天的雨，心情也变得湿漉漉的。想家了。</p>
                </div>
            </div>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-100 pb-6 pt-3 px-8 flex justify-between items-center z-50">
        <a href="#" class="flex flex-col items-center gap-1 text-primary">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-medium">首页</span>
        </a>
        <a href="stats.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors">
            <i class="fas fa-chart-pie text-xl"></i>
            <span class="text-[10px] font-medium">统计</span>
        </a>
        <a href="tools.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors">
            <i class="fas fa-first-aid text-xl"></i>
            <span class="text-[10px] font-medium">急救</span>
        </a>
        <a href="settings.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors">
            <i class="fas fa-cog text-xl"></i>
            <span class="text-[10px] font-medium">设置</span>
        </a>
    </nav>

</body>
</html>
