<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodDiary - Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Quicksand', 'sans-serif'],
                    },
                    colors: {
                        bg: '#FAFAF9',
                        card: '#FFFFFF',
                        primary: '#333333',
                        secondary: '#8E8E93',
                        'mood-ecstatic': '#FFD166',
                        'mood-happy': '#FFB7B2',
                        'mood-neutral': '#E2F0CB',
                        'mood-sad': '#B5EAD7',
                        'mood-angry': '#FF9AA2',
                    }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Donut Chart Mock */
        .donut-chart {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(
                #FFB7B2 0% 40%, 
                #E2F0CB 40% 70%, 
                #B5EAD7 70% 90%, 
                #FF9AA2 90% 100%
            );
            position: relative;
        }
        .donut-center {
            width: 70%;
            height: 70%;
            background: #FFFFFF;
            border-radius: 50%;
            position: absolute;
            top: 15%;
            left: 15%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
    </style>
</head>
<body class="bg-bg text-primary font-sans h-screen overflow-hidden flex flex-col select-none">

    <!-- Status Bar -->
    <div class="h-12 flex justify-between items-center px-6 text-sm font-medium pt-2 z-50 bg-bg">
        <span>9:41</span>
        <div class="flex items-center space-x-2">
            <i class="fas fa-signal text-xs"></i>
            <i class="fas fa-wifi text-xs"></i>
            <i class="fas fa-battery-full text-xs"></i>
        </div>
    </div>

    <!-- Header -->
    <header class="px-6 pt-2 pb-4">
        <h1 class="text-2xl font-bold text-primary">数据回顾</h1>
        <p class="text-sm text-secondary">2025年 12月</p>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto hide-scrollbar px-6 pb-24">
        
        <!-- Streak Card -->
        <div class="flex items-center gap-4 mb-6">
            <div class="text-4xl">🔥</div>
            <div>
                <p class="text-xs text-secondary">连续记录</p>
                <p class="text-2xl font-bold text-primary">12 天</p>
            </div>
            <div class="ml-auto bg-orange-100 text-orange-500 text-xs px-2 py-1 rounded-full font-bold">
                本周全勤
            </div>
        </div>

        <!-- Weekly Trend -->
        <div class="bg-white rounded-3xl shadow-sm p-5 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-bold text-primary">本周心情趋势</h2>
                <span class="text-xs text-secondary bg-gray-100 px-2 py-1 rounded-lg">Week 48</span>
            </div>
            
            <!-- Bar Chart Mock -->
            <div class="h-32 flex items-end justify-between gap-2 px-2">
                <!-- Mon -->
                <div class="flex flex-col items-center gap-2 w-full">
                    <div class="w-full bg-mood-happy rounded-t-md h-16 opacity-50"></div>
                    <span class="text-xs text-secondary">一</span>
                </div>
                <!-- Tue -->
                <div class="flex flex-col items-center gap-2 w-full">
                    <div class="w-full bg-mood-neutral rounded-t-md h-12 opacity-50"></div>
                    <span class="text-xs text-secondary">二</span>
                </div>
                <!-- Wed -->
                <div class="flex flex-col items-center gap-2 w-full">
                    <div class="w-full bg-mood-happy rounded-t-md h-20 opacity-50"></div>
                    <span class="text-xs text-secondary">三</span>
                </div>
                <!-- Thu -->
                <div class="flex flex-col items-center gap-2 w-full">
                    <div class="w-full bg-mood-sad rounded-t-md h-8 opacity-50"></div>
                    <span class="text-xs text-secondary">四</span>
                </div>
                <!-- Fri -->
                <div class="flex flex-col items-center gap-2 w-full">
                    <div class="w-full bg-mood-ecstatic rounded-t-md h-28"></div> <!-- Highlight -->
                    <span class="text-xs font-bold text-primary">五</span>
                </div>
                <!-- Sat -->
                <div class="flex flex-col items-center gap-2 w-full">
                    <div class="w-full bg-gray-100 rounded-t-md h-2"></div>
                    <span class="text-xs text-secondary">六</span>
                </div>
                <!-- Sun -->
                <div class="flex flex-col items-center gap-2 w-full">
                    <div class="w-full bg-gray-100 rounded-t-md h-2"></div>
                    <span class="text-xs text-secondary">日</span>
                </div>
            </div>
        </div>

        <!-- Monthly Distribution -->
        <div class="bg-white rounded-3xl shadow-sm p-5 mb-6 flex items-center gap-6">
            <div class="donut-chart shrink-0">
                <div class="donut-center">
                    <span class="text-xl font-bold">30</span>
                    <span class="text-[10px] text-secondary">Records</span>
                </div>
            </div>
            <div class="flex-1">
                <h2 class="text-sm font-bold text-primary mb-3">当月占比</h2>
                <div class="space-y-2">
                    <div class="flex items-center justify-between text-xs">
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full bg-mood-happy"></div>
                            <span>开心</span>
                        </div>
                        <span class="font-bold">40%</span>
                    </div>
                    <div class="flex items-center justify-between text-xs">
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full bg-mood-neutral"></div>
                            <span>平淡</span>
                        </div>
                        <span class="font-bold">30%</span>
                    </div>
                    <div class="flex items-center justify-between text-xs">
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full bg-mood-sad"></div>
                            <span>难过</span>
                        </div>
                        <span class="font-bold">20%</span>
                    </div>
                    <div class="flex items-center justify-between text-xs">
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full bg-mood-angry"></div>
                            <span>愤怒</span>
                        </div>
                        <span class="font-bold">10%</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Best vs Worst -->
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-mood-ecstatic/20 rounded-3xl p-4 flex flex-col items-center text-center">
                <span class="text-xs font-bold text-primary/60 mb-1">BEST DAY</span>
                <span class="text-2xl mb-1">🤩</span>
                <span class="text-sm font-bold text-primary">12月5日</span>
                <span class="text-[10px] text-secondary mt-1">项目上线</span>
            </div>
            <div class="bg-mood-sad/20 rounded-3xl p-4 flex flex-col items-center text-center">
                <span class="text-xs font-bold text-primary/60 mb-1">WORST DAY</span>
                <span class="text-2xl mb-1">😔</span>
                <span class="text-sm font-bold text-primary">12月4日</span>
                <span class="text-[10px] text-secondary mt-1">下雨天</span>
            </div>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-100 pb-6 pt-3 px-6 flex justify-between items-end z-50">
        <a href="home.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors w-12">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-medium">首页</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-primary w-12">
            <i class="fas fa-chart-pie text-xl"></i>
            <span class="text-[10px] font-medium">统计</span>
        </a>

        <div class="relative -top-5">
             <a href="editor.html" class="w-14 h-14 bg-primary rounded-full flex items-center justify-center text-white shadow-lg text-2xl hover:scale-105 transition-transform border-4 border-[#FAFAF9]">
                <i class="fas fa-plus"></i>
            </a>
        </div>

        <a href="tools.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors w-12">
            <i class="fas fa-first-aid text-xl"></i>
            <span class="text-[10px] font-medium">急救</span>
        </a>
        <a href="settings.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors w-12">
            <i class="fas fa-cog text-xl"></i>
            <span class="text-[10px] font-medium">设置</span>
        </a>
    </nav>

</body>
</html>
