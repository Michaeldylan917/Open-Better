<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拾光日签 - 记录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Quicksand', 'sans-serif'],
                    },
                    colors: {
                        bg: '#FAFAF9',
                        card: '#FFFFFF',
                        primary: '#333333',
                        secondary: '#8E8E93',
                        'mood-ecstatic': '#FFD166',
                        'mood-happy': '#FFB7B2',
                        'mood-neutral': '#E2F0CB',
                        'mood-sad': '#B5EAD7',
                        'mood-angry': '#FF9AA2',
                    }
                }
            }
        }
    </script>
    <style>
        .mood-btn:checked + label {
            transform: scale(1.1);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 2px solid #333;
        }
    </style>
</head>
<body class="bg-bg text-primary font-sans h-screen overflow-hidden flex flex-col relative">

    <!-- Status Bar -->
    <div class="h-12 flex justify-between items-center px-6 text-sm font-medium pt-2 z-50">
        <span>9:41</span>
        <div class="flex items-center space-x-2">
            <i class="fas fa-signal text-xs"></i>
            <i class="fas fa-wifi text-xs"></i>
            <i class="fas fa-battery-full text-xs"></i>
        </div>
    </div>

    <!-- Nav Bar -->
    <div class="px-6 py-2 flex justify-between items-center mb-4">
        <a href="home.html" class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-secondary hover:text-primary transition-colors">
            <i class="fas fa-times text-lg"></i>
        </a>
        <div class="text-lg font-bold">记录心情</div>
        <div class="w-10"></div> <!-- Spacer -->
    </div>

    <!-- Date Display -->
    <div class="px-6 mb-8 text-center">
        <div class="inline-block bg-white px-4 py-2 rounded-full shadow-sm text-sm font-bold text-primary">
            2025年 12月 6日 · 今天
        </div>
    </div>

    <!-- Main Form -->
    <main class="flex-1 px-6 overflow-y-auto pb-24">
        
        <h2 class="text-xl font-bold mb-6 text-center">现在感觉如何?</h2>

        <!-- Mood Selector -->
        <div class="flex justify-between mb-10 px-2">
            <!-- Ecstatic -->
            <div class="flex flex-col items-center gap-2">
                <input type="radio" name="mood" id="m1" class="hidden mood-btn">
                <label for="m1" class="w-14 h-14 rounded-full bg-mood-ecstatic flex items-center justify-center text-3xl cursor-pointer transition-all duration-300 hover:scale-105">
                    🤩
                </label>
                <span class="text-xs font-medium text-secondary">狂喜</span>
            </div>
            <!-- Happy -->
            <div class="flex flex-col items-center gap-2">
                <input type="radio" name="mood" id="m2" class="hidden mood-btn" checked>
                <label for="m2" class="w-14 h-14 rounded-full bg-mood-happy flex items-center justify-center text-3xl cursor-pointer transition-all duration-300 hover:scale-105">
                    😊
                </label>
                <span class="text-xs font-medium text-secondary">开心</span>
            </div>
            <!-- Neutral -->
            <div class="flex flex-col items-center gap-2">
                <input type="radio" name="mood" id="m3" class="hidden mood-btn">
                <label for="m3" class="w-14 h-14 rounded-full bg-mood-neutral flex items-center justify-center text-3xl cursor-pointer transition-all duration-300 hover:scale-105">
                    😐
                </label>
                <span class="text-xs font-medium text-secondary">平淡</span>
            </div>
            <!-- Sad -->
            <div class="flex flex-col items-center gap-2">
                <input type="radio" name="mood" id="m4" class="hidden mood-btn">
                <label for="m4" class="w-14 h-14 rounded-full bg-mood-sad flex items-center justify-center text-3xl cursor-pointer transition-all duration-300 hover:scale-105">
                    😔
                </label>
                <span class="text-xs font-medium text-secondary">难过</span>
            </div>
            <!-- Angry -->
            <div class="flex flex-col items-center gap-2">
                <input type="radio" name="mood" id="m5" class="hidden mood-btn">
                <label for="m5" class="w-14 h-14 rounded-full bg-mood-angry flex items-center justify-center text-3xl cursor-pointer transition-all duration-300 hover:scale-105">
                    😡
                </label>
                <span class="text-xs font-medium text-secondary">愤怒</span>
            </div>
        </div>

        <!-- Note Area -->
        <div class="bg-white rounded-3xl p-5 shadow-sm mb-6">
            <label class="block text-sm font-bold text-primary mb-3">写点什么 (可选)</label>
            <textarea class="w-full h-32 bg-gray-50 rounded-xl p-4 text-sm text-primary placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-mood-happy/50 resize-none" placeholder="记录下此刻的想法..."></textarea>
            <div class="text-right mt-2 text-xs text-gray-300">0/140</div>
        </div>

        <!-- Tags (Optional) -->
        <div class="mb-8">
            <label class="block text-sm font-bold text-primary mb-3">标签</label>
            <div class="flex flex-wrap gap-2">
                <button class="px-3 py-1.5 bg-white rounded-full text-xs font-medium shadow-sm text-secondary hover:bg-mood-happy/20 hover:text-primary transition-colors">#工作</button>
                <button class="px-3 py-1.5 bg-white rounded-full text-xs font-medium shadow-sm text-secondary hover:bg-mood-happy/20 hover:text-primary transition-colors">#学习</button>
                <button class="px-3 py-1.5 bg-mood-happy text-white rounded-full text-xs font-medium shadow-sm">#家庭</button>
                <button class="px-3 py-1.5 bg-white rounded-full text-xs font-medium shadow-sm text-secondary hover:bg-mood-happy/20 hover:text-primary transition-colors">#美食</button>
                <button class="px-3 py-1.5 bg-white rounded-full text-xs font-medium shadow-sm text-secondary hover:bg-mood-happy/20 hover:text-primary transition-colors">#运动</button>
                <button class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 text-xs">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>

    </main>

    <!-- Save Button -->
    <div class="absolute bottom-8 left-0 w-full px-6">
        <a href="home.html" class="block w-full bg-primary text-white text-center py-4 rounded-2xl font-bold shadow-lg hover:bg-gray-800 transition-colors transform active:scale-95">
            保存记录
        </a>
    </div>

</body>
</html>
